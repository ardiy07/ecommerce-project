services:
  gateway:
    build: 
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "8081:8081"
    volumes:
      - ./gateway/src:/usr/src/app/src
      - ./gateway/src/main/resources/application.yml:/usr/src/app/src/main/resources/application.yml
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    depends_on:
      - auth-service
    networks:
      - ecommerce
  auth-service:
    build: 
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "3000:3000"
    volumes:
      - ./services/auth-service:/usr/src/app
      - ./services/auth-service/node_modules:/usr/src/app/node_modules
    env_file:
      - ./services/auth-service/.env
    networks:
      - ecommerce

  #database
  mysql:
    image: mysql
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=admin
      - MYSQL_USERNAME=root
      - MYSQL_PASSWORD=admin
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ecommerce

networks:
  ecommerce:
    driver: bridge

volumes:
  mysql_data: